project:
  type: website
  output-dir: docs

jupyter: python3

lang: en

website:
  title: "The Spotted Ape"
  favicon: images/favicon.png
  site-url: https://spottedape.github.io
  search: false
  navbar: false

format:
  html:
    page-layout: custom
    toc: false
    minimal: true
    #theme: [none, theme.scss]
    css: theme.css
    include-in-header: head.html
    include-before-body: navbar.html
    include-after-body: footer.html
    template-partials:
      - title-block.html